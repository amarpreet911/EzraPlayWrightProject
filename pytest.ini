[pytest]
# Pytest configuration file

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 6.0

# Add current directory to path
pythonpath = .

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    -ra

# Test markers
markers =
    booking: Booking flow tests
    payment: Payment processing tests
    appointment: Appointment scheduling tests
    signup: User signup/join tests
    user_login: User login tests
    select_plan: Select Plan page tests (DOB and Sex selection)
    questionnaire: Medical questionnaire tests
    bug: Bug regression tests
    bug_1: Bug #1 – Heart scan / Lung add-on not displayed
    bug_2: Bug #2 – Radio-button selection not changeable after back navigation
    bug_3: Bug #3 – Far-off date selection (up to 2044)
    bug_3_1: Bug #3.1 – Questionnaire validity not enforced for far-future bookings
    bug_4: Bug #4 – Questionnaire accepts a different person's name / DOB
    bug_5: Bug #5 – Surgery date allowed before user's date of birth
    bug_6: Bug #6 – Ease-of-use issues in the implants/devices checklist
    bug_7: Bug #7 – Tattoo healing window should be from MRI date, not questionnaire date
    bug_8: Bug #8 – Questionnaire completion page drops back to dashboard
    bug_9: Bug #9 – Questionnaire completion window (5-day minimum)
    bug_12: Bug #12 – Aggregated locations hide individual-scan location options
    bug_14: Bug #14 – Weight field accepts 1 kg (no minimum)
    bug_15: Bug #15 – Height value disappears when weight is changed
    bug_16: Bug #16 – Resuming a half-filled questionnaire shows "Start" instead of "Continue"
    slow: Slow tests
    integration: Integration tests
    smoke: Smoke tests

# Timeout for tests (in seconds)
timeout = 300

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S


