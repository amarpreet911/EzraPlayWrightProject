[pytest]
# API test suite — runs independently of the Playwright UI suite

python_files  = test_*.py
python_classes = Test*
python_functions = test_*

minversion = 6.0
pythonpath = .

addopts =
    -v
    --strict-markers
    --tb=short
    -ra

markers =
    api:          Pure API / HTTP tests (no browser)
    e2e:          End-to-end tests combining booking flow + privacy checks
    privacy:      Authorization and data-privacy API tests

timeout = 30

log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

